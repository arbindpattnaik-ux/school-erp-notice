<h1>📊 Admin Dashboard</h1>

<a href="/add">➕ Add Notice</a>
<hr>

<table border="1" cellpadding="10">
<tr>
    <th>Title</th>
    <th>Category</th>
    <th>Actions</th>
</tr>

{% for n in notices %}
<tr>
    <td>{{n[1]}}</td>
    <td>{{n[3]}}</td>
    <td>
        <a href="/edit/{{n[0]}}">✏ Edit</a> |
        <a href="/delete/{{n[0]}}">❌ Delete</a>
    </td>
</tr>
{% endfor %}
</table>
