<h2>Edit Notice</h2>

<form method="POST">

    <textarea name="content">{{notice[2]}}</textarea><br><br>

    <input name="category" value="{{notice[3]}}"><br><br>

    <input type="date" name="expiry" value="{{notice[5]}}"><br><br>

    <button>Update</button>
</form>
